<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a5447" />
  <title>Log Masuk — Sistem Pantau Kehadiran</title>
  <style>
    :root { --hijau: #0a5447; --hijau2: #0c6a59; --bg: #f3f5f4; --merah: #b3261e; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(160deg, var(--hijau) 0%, var(--hijau2) 40%, var(--bg) 40%);
      padding: 20px;
    }
    .card {
      width: 100%; max-width: 380px; background: #fff; border-radius: 16px;
      box-shadow: 0 12px 40px rgba(0,0,0,.18); padding: 28px 24px;
    }
    .brand { text-align: center; margin-bottom: 22px; }
    .brand .eyebrow { color: var(--hijau); font-size: 12px; letter-spacing: .04em; margin: 0 0 4px; text-transform: uppercase; }
    .brand h1 { font-size: 19px; margin: 0; color: #16302a; }
    label { display: block; font-size: 13px; font-weight: 600; color: #2b3a36; margin: 14px 0 6px; }
    input {
      width: 100%; padding: 12px 14px; border: 1.5px solid #d6ddda; border-radius: 10px;
      font-size: 16px; outline: none; transition: border-color .15s;
    }
    input:focus { border-color: var(--hijau); }
    .btn {
      width: 100%; margin-top: 20px; padding: 13px; border: 0; border-radius: 10px;
      background: var(--hijau); color: #fff; font-size: 16px; font-weight: 700; cursor: pointer;
    }
    .btn:disabled { opacity: .6; cursor: not-allowed; }
    .ralat { margin-top: 14px; color: var(--merah); font-size: 14px; min-height: 18px; text-align: center; }
    .nota { margin-top: 16px; text-align: center; font-size: 12px; color: #6a7a75; }
  </style>
</head>
<body>
  <main class="card">
    <div class="brand">
      <p class="eyebrow">SABK Maahad Al-Khair Lil Banat</p>
      <h1>Sistem Pantau Kehadiran</h1>
    </div>
    <form id="form-login" autocomplete="on">
      <label for="username">Nama Pengguna</label>
      <input id="username" name="username" type="text" autocomplete="username" required autofocus />
      <label for="kata_laluan">Kata Laluan</label>
      <input id="kata_laluan" name="kata_laluan" type="password" autocomplete="current-password" required />
      <button id="btn-login" class="btn" type="submit">Log Masuk</button>
      <div id="ralat" class="ralat" role="alert"></div>
    </form>
    <p class="nota">Akses pentadbir sahaja. Guru tidak perlu log masuk.</p>
  </main>
  <script src="/login.js"></script>
</body>
</html>
