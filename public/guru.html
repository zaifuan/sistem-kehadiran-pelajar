<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>Isi Kehadiran — Guru Kelas</title>
  <link rel="stylesheet" href="/guru.css" />
  <!-- PWA -->
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/assets/icon-192.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="Kehadiran" />
  <script src="/pwa-register.js" defer></script>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img class="logo" src="/assets/logo-sekolah.png"
           alt="Logo SABK Maahad Al-Khair Lil Banat"
           onerror="this.style.display='none'" />
      <div class="brand-txt">
        <h1 class="sekolah">SABK MAAHAD AL-KHAIR LIL BANAT</h1>
        <p class="sistem">Sistem Pengurusan Kehadiran Pelajar</p>
      </div>
      <div class="clock">
        <span class="c-tarikh num" id="tarikh-hari-ini">—</span>
        <span class="c-masa num" id="masa-semasa">—</span>
      </div>
    </div>
    <div class="subbar" id="subbar" hidden>
      <button id="btn-back" class="iconbtn" type="button" aria-label="Kembali">←</button>
      <span id="topbar-title" class="screen-title">Isi Kehadiran</span>
    </div>
  </header>

  <main>
    <!-- Skrin 1: Pilih kelas -->
    <section id="screen-kelas" class="screen is-active" aria-label="Pilih kelas">
      <div class="kelas-bar">
        <p class="hint">Pilih kelas untuk isi kehadiran hari ini.</p>
        <div class="legend" aria-hidden="true">
          <span class="lg lg-ok">Selesai</span>
          <span class="lg lg-bad">Belum Isi</span>
        </div>
      </div>
      <div id="grid-kelas" class="grid-kelas"><div class="loading"><div class="spinner"></div>Memuatkan kelas…</div></div>
    </section>

    <!-- Skrin 2: Isi kehadiran -->
    <section id="screen-isi" class="screen" aria-label="Isi kehadiran" hidden>
      <div class="kelas-head">
        <h2 id="isi-nama-kelas">—</h2>
        <p id="isi-guru" class="guru">—</p>
      </div>
      <input id="cari-pelajar" class="cari" type="search" placeholder="🔍 Cari nama pelajar…" autocomplete="off" />
      <div class="phead" aria-hidden="true">
        <span class="h-bil">Bil</span>
        <span class="h-hadir">Hadir</span>
        <span class="h-nama">Nama Pelajar</span>
        <span class="h-sebab">Sebab Tidak Hadir</span>
      </div>
      <div id="senarai-pelajar" class="senarai"></div>
    </section>

    <!-- Skrin 3: Sahkan -->
    <section id="screen-sahkan" class="screen" aria-label="Sahkan kehadiran" hidden>
      <h2 class="sah-ttl">Sahkan Kehadiran</h2>
      <div id="sah-ringkasan" class="sah-ringkasan"></div>
      <div id="sah-senarai"></div>
      <div class="sah-btns">
        <button id="btn-sahkan" class="btn btn-primary" type="button">Sahkan &amp; Simpan</button>
        <button id="btn-batal-sah" class="btn btn-ghost" type="button">Batal</button>
      </div>
    </section>
  </main>

  <!-- Ringkasan sticky (semasa skrin isi) -->
  <div id="bar-ringkasan" class="bar-ringkasan" hidden>
    <div class="ring-stats">
      <div><b id="r-jumlah" class="num">0</b><span>Jumlah</span></div>
      <div><b id="r-hadir" class="num">0</b><span>Hadir</span></div>
      <div class="th"><b id="r-th" class="num">0</b><span>T/Hadir</span></div>
      <div class="wk"><b id="r-wakil" class="num">0</b><span>Wakil</span></div>
    </div>
    <div class="ring-btns">
      <button id="btn-reset" class="btn btn-ghost sm" type="button">Set Semula</button>
      <button id="btn-simpan" class="btn btn-primary sm" type="button">Hantar</button>
    </div>
  </div>

  <div id="toast" class="toast" hidden></div>

  <script src="/guru.js"></script>
</body>
</html>
